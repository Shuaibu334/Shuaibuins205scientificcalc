
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>

    <!-- CSS -->
    <link rel="stylesheet" href="scientificcal.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="calculator">

        <!-- Display -->
        <div class="display">
            <input type="text" id="screen" placeholder="0" readonly>
        </div>

        <!-- Row 1 -->
        <div class="buttons">
            <button class="operator" onclick="clearScreen()">C</button>
            <button class="operator" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="appendValue('(')">(</button>
            <button class="operator" onclick="appendValue(')')">)</button>
            <button class="operator" onclick="appendValue('/')">÷</button>

            <!-- Row 2 -->
            <button onclick="scientificFunction('sin')">sin</button>
            <button onclick="scientificFunction('cos')">cos</button>
            <button onclick="scientificFunction('tan')">tan</button>
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">×</button>

            <!-- Row 3 -->
            <button onclick="scientificFunction('log')">log</button>
            <button onclick="scientificFunction('ln')">ln</button>
            <button onclick="scientificFunction('sqrt')">√</button>
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">−</button>

            <!-- Row 4 -->
            <button onclick="scientificFunction('square')">x²</button>
            <button onclick="scientificFunction('cube')">x³</button>
            <button onclick="scientificFunction('power')">xʸ</button>
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <!-- Row 5 -->
            <button onclick="appendValue(Math.PI)">π</button>
            <button onclick="appendValue(Math.E)">e</button>
            <button onclick="scientificFunction('factorial')">x!</button>
            <button onclick="appendValue('%')">%</button>
            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>

        </div>

    </div>

</div>

<!-- JavaScript -->
<script src="scientificcal.js"></script>

</body>
</html>
